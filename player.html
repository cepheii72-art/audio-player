<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d23;
            --accent-color: #c9a36c;
            --accent-glow: rgba(201, 163, 108, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --progress-bg: #2d323a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .player-container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 60px 40px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 40px;
            color: var(--accent-color);
            word-break: keep-all;
            line-height: 1.4;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .play-btn {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(201, 163, 108, 0.3);
            position: relative;
            z-index: 2;
        }

        .play-btn:hover { transform: scale(1.05); }
        .play-btn:active { transform: scale(0.95); }
        .play-btn svg { width: 40px; height: 40px; fill: #111; }

        .progress-section { width: 100%; }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-display {
            font-size: 14px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            font-variant-numeric: tabular-nums;
        }

        .status-msg {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-dim);
            opacity: 0.8;
        }

        .error-msg {
            color: #ff5f5f;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="title" id="title">준비 중...</div>

        <div class="controls">
            <button class="play-btn" id="playBtn" disabled>
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path id="iconPath" d="M8 5v14l11-7z" />
                </svg>
            </button>

            <div class="progress-section">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="status-msg" id="statusMsg">재생 버튼을 눌러주세요.</div>
            <div class="error-msg" id="errorMsg">파일을 찾을 수 없거나 로드에 실패했습니다.</div>
        </div>
    </div>

    <audio id="audio" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const iconPath = document.getElementById('iconPath');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const titleEl = document.getElementById('title');
        const errorEl = document.getElementById('errorMsg');
        const statusEl = document.getElementById('statusMsg');

        const PLAY_PATH = 'M8 5v14l11-7z';
        const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

        function init() {
            const params = new URLSearchParams(window.location.search);
            let fileName = params.get('f') || (window.location.hash ? window.location.hash.substring(1) : null);

            if (fileName) {
                fileName = decodeURIComponent(fileName);
                titleEl.innerText = fileName.replace('.mp3', '');
                audio.src = encodeURIComponent(fileName);
                playBtn.disabled = false;

                // 자동 재생 시도
                audio.play().catch(() => {
                    statusEl.innerText = "터치하여 재생을 시작하세요.";
                });
            } else {
                titleEl.innerText = "재생할 파일이 없습니다.";
                statusEl.innerText = "?f=파일명.mp3 형식을 확인해주세요.";
            }
        }

        function updateUI(isPlaying) {
            iconPath.setAttribute('d', isPlaying ? PAUSE_PATH : PLAY_PATH);
            statusEl.innerText = isPlaying ? "현재 재생 중입니다." : "일시 정지됨";
        }

        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            const min = Math.floor(time / 60);
            const sec = Math.floor(time % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) audio.play();
            else audio.pause();
        });

        audio.addEventListener('play', () => updateUI(true));
        audio.addEventListener('pause', () => updateUI(false));

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = (percent || 0) + '%';
            currentTimeEl.innerText = formatTime(audio.currentTime);
            if (audio.duration) durationEl.innerText = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            updateUI(false);
            progressBar.style.width = '0%';
            currentTimeEl.innerText = '0:00';
            statusEl.innerText = "재생 완료";
        });

        audio.addEventListener('error', () => {
            errorEl.style.display = 'block';
            statusEl.innerText = "로드 실패";
        });

        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            if (audio.duration) audio.currentTime = (clickX / width) * audio.duration;
        });

        init();
    </script>
</body>
</html>
