<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d23;
            --accent-color: #c9a36c;
            --accent-glow: rgba(201, 163, 108, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --progress-bg: #2d323a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .player-container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 60px 40px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 배경 장식 */
        .player-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 40px;
            color: var(--accent-color);
            word-break: keep-all;
            line-height: 1.4;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* 클릭 가능 표시 */
        }

        .title:hover { opacity: 0.8; }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .play-btn {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(201, 163, 108, 0.3);
            position: relative;
            z-index: 2;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(201, 163, 108, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: #111;
        }

        .progress-section {
            width: 100%;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .time-display {
            font-size: 14px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            font-variant-numeric: tabular-nums;
        }

        .status-msg {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-dim);
            opacity: 0.8;
            letter-spacing: -0.02em;
        }

        .error-msg {
            color: #ff5f5f;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Skeleton animation for loading */
        .loading .title {
            background: linear-gradient(90deg, #222, #333, #222);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite;
            border-radius: 10px;
            color: transparent;
        }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 플레이리스트 모달 추가 */
        #playlistModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #playlistModal h2 { color: var(--accent-color); margin-bottom: 20px; }
        
        .list-container {
            width: 100%;
            max-width: 350px;
            max-height: 60vh;
            overflow-y: auto;
            background: #111;
            border-radius: 20px;
            padding: 10px;
        }

        .list-item {
            padding: 15px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover { background: #222; color: var(--accent-color); }
        .list-item:last-child { border-bottom: none; }

        .close-modal {
            margin-top: 30px;
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body class="loading">

    <div class="player-container">
        <div class="title" id="title" title="클릭하여 목록 보기">오디오를 불러오는 중...</div>

        <div class="controls">
            <button class="play-btn" id="playBtn" disabled>
                <svg id="playIcon" viewBox="0 0 24 24">
                    <path id="iconPath" d="M8 5v14l11-7z" />
                </svg>
            </button>

            <div class="progress-section">
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="status-msg" id="statusMsg">재생 버튼을 눌러주세요.</div>
            <div class="error-msg" id="errorMsg">파일을 재생할 수 없습니다.</div>
        </div>
    </div>

    <!-- 플레이리스트 모달 -->
    <div id="playlistModal">
        <h2>플레이리스트</h2>
        <div class="list-container" id="listContainer"></div>
        <button class="close-modal" id="closeModal">닫기</button>
    </div>

    <audio id="audio" preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const iconPath = document.getElementById('iconPath');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const titleEl = document.getElementById('title');
        const errorEl = document.getElementById('errorMsg');
        const statusEl = document.getElementById('statusMsg');
        const playlistModal = document.getElementById('playlistModal');
        const listContainer = document.getElementById('listContainer');
        const closeModal = document.getElementById('closeModal');

        let playlist = [];

        // SVG Paths
        const PLAY_PATH = 'M8 5v14l11-7z';
        const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

        async function initPlayer() {
            try {
                const response = await fetch('playlist.json');
                if (!response.ok) throw new Error('Playlist load failed');
                const config = await response.json();
                playlist = config.files || [];
                
                renderPlaylist();

                // 1. 쿼리 파라미터 확인 (?f=)
                const params = new URLSearchParams(window.location.search);
                let targetFile = params.get('f');

                // 2. 해시 확인 (#파일명) - 쿼리 스트링이 안될 경우 대비
                if (!targetFile && window.location.hash) {
                    targetFile = window.location.hash.substring(1);
                }

                if (targetFile) {
                    // 한글 인코딩 복원 (GitHub 등에서 인코딩된 채로 들어올 수 있음)
                    targetFile = decodeURIComponent(targetFile);
                    setupAudio(targetFile);
                } else if (playlist.length > 0) {
                    setupAudio(playlist[0]);
                } else {
                    throw new Error('재생할 파일이 없습니다.');
                }
            } catch (err) {
                console.error(err);
                titleEl.innerText = "파일 목록을 불러올 수 없습니다";
                document.body.classList.remove('loading');
                showModal();
            }
        }

        function renderPlaylist() {
            listContainer.innerHTML = '';
            playlist.forEach(file => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerText = file.replace('.mp3', '');
                item.onclick = () => {
                    setupAudio(file);
                    hideModal();
                };
                listContainer.appendChild(item);
            });
        }

        function setupAudio(fileName) {
            const displayName = fileName.replace('.mp3', '');
            titleEl.innerText = displayName;
            
            // 기존 오디오 초기화
            audio.pause();
            audio.currentTime = 0;
            progressBar.style.width = '0%';
            
            // 파일명 인코딩 처리
            audio.src = encodeURIComponent(fileName);
            playBtn.disabled = false;
            errorEl.style.display = 'none';
            document.body.classList.remove('loading');

            audio.play().then(() => {
                updateUI(true);
            }).catch(() => {
                statusEl.innerText = "터치하여 재생을 시작하세요.";
            });
        }

        function updateUI(isPlaying) {
            iconPath.setAttribute('d', isPlaying ? PAUSE_PATH : PLAY_PATH);
            statusEl.innerText = isPlaying ? "현재 재생 중입니다." : "일시 정지됨";
        }

        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            const min = Math.floor(time / 60);
            const sec = Math.floor(time % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        function showModal() { playlistModal.style.display = 'flex'; }
        function hideModal() { playlistModal.style.display = 'none'; }

        // Events
        titleEl.addEventListener('click', showModal);
        closeModal.addEventListener('click', hideModal);

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        audio.addEventListener('play', () => updateUI(true));
        audio.addEventListener('pause', () => updateUI(false));

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = (percent || 0) + '%';
            currentTimeEl.innerText = formatTime(audio.currentTime);
            if (audio.duration) {
                durationEl.innerText = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            updateUI(false);
            progressBar.style.width = '0%';
            currentTimeEl.innerText = '0:00';
            statusEl.innerText = "재생이 완료되었습니다.";
        });

        audio.addEventListener('error', (e) => {
            console.error("Audio error:", e);
            errorEl.style.display = 'block';
            statusEl.innerText = "파일을 로드할 수 없습니다.";
        });

        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            if (audio.duration) {
                audio.currentTime = (clickX / width) * audio.duration;
            }
        });

        // Initialize
        initPlayer();
    </script>
</body>
</html>
